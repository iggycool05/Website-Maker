<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Website Builder</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="./CSS/tabBar.css">
  <link rel="stylesheet" href="./CSS/ribbonBar.css">
  <link rel="stylesheet" href="./CSS/toolbar.css">
  <link rel="stylesheet" href="./CSS/toolTip.css">

</head>
<body style="background-color: white;">
  <!-- Entire app -->
  <div id="app">

<!-- Top toolbar with tabs -->
<div class="tab-bar">
  <button class="tab" id="fileTabBtn">File</button>
  <button class="tab active" id="htmlEditorTabBtn">HTML Editor</button>
  <button class="tab" id="cssEditorTabBtn">CSS Editor</button>
  <button class="tab" id="jsEditorTabBtn">JS Editor</button>
  <button class="tab" id="sourceCodeTabBtn">Source Code</button>
  <button class="tab" id="renderPreviewBtn">Render</button>
</div>

<!-- HTML Editor Ribbon -->
<section id="htmlEditorRibbon" class="ribbon-panel hidden">

  <div class="group">
    <div class="group-body">

      <!-- Heading split button -->
      <div class="split-btn">
        <button id="addHeadingBtn" class="rbtn large">
          <span class="ico sm">H</span>
          <span class="lbl">Heading</span>
        </button>
        <button id="headingDropdownBtn" class="split-arrow" type="button">▾</button>
        <div id="headingDropdownMenu" class="dropdown-menu">
          <button type="button" data-heading-level="1">H1</button>
          <button type="button" data-heading-level="2">H2</button>
          <button type="button" data-heading-level="3">H3</button>
          <button type="button" data-heading-level="4">H4</button>
          <button type="button" data-heading-level="5">H5</button>
          <button type="button" data-heading-level="6">H6</button>
        </div>
      </div>

      <div class="sep-v"></div>

      <!-- Font size stepper -->
      <div class="font-row" id="fontTools">
        <button id="decreaseFontBtn" class="icon-btn">&#8722;</button>
        <span id="fontSizeNumber"
              style="min-width:24px; text-align:center; font-size:11px; color:#222;">0</span>
        <button id="increaseFontBtn" class="icon-btn">&#43;</button>
      </div>

      <div class="sep-v"></div>

      <!-- Element insert buttons -->
      <button id="addParagraphBtn" class="rbtn" data-tip
          data-tip-title="Paragraph (Ctrl+P)"
          data-tip-p1="Wraps selected content or inserts a new &lt;p&gt; block element."
          data-tip-p2="Paragraphs are the standard container for body text in HTML."
          data-tip-shortcut="Ctrl+P">
          <span class="tip-progress"></span>
        <span class="ico sm">¶</span>
        <span class="lbl">Paragraph</span>
      </button>
      <button id="addDivBtn" class="rbtn">
        <span class="ico sm">&#9633;</span>
        <span class="lbl">Div</span>
      </button>
      <button id="addSpanBtn" class="rbtn">
        <span class="ico sm">&#60;&#47;&#62;</span>
        <span class="lbl">Span</span>
      </button>
      <button id="addImageBtn" class="rbtn">
        <span class="ico sm">&#128444;</span>
        <span class="lbl">Image</span>
      </button>
      <input id="addImageInput" type="file" accept="image/*" hidden>

    </div>
    <div class="group-label">Text</div>
  </div>

</section>

    <header id="toolbar">
      <div id="toolbarCenter">
        <!-- Font tools -->




      <div id="toolbarRight">
        <!-- leave empty for now -->
      </div>
    </header>

    <!-- Main working area -->
    <main id="workspace">

      <!-- Code editor panel -->
      <section id="codePanel">
        <textarea id="htmlInput"><p class="draggable-item" contenteditable="true" style="position: absolute; left: 50px; top: 50px;">
  Drag me around
</p>

<h1 class="draggable-item" contenteditable="true" style="position: absolute; left: 220px; top: 130px;">
  Move me too
</h1>

<div class="draggable-item" style="position: absolute; left: 50px; top: 50px; width: 200px; height: 100px;">
  <div class="resize-handle top-left"></div>
  <div class="resize-handle top-right"></div>
  <div class="resize-handle bottom-left"></div>
  <div class="resize-handle bottom-right"></div>

  <p contenteditable="true">Resize me</p>
</div></textarea>
      </section>

      <!-- Live preview panel -->
      <section id="previewPanel" style="background-color: white;">
        <iframe id="previewFrame"></iframe>
      </section>

    </main>
  </div>

  <!-- Single shared tooltip element -->
  <div id="ribbon-tooltip">
    <div class="tt-title" id="tt-title"></div>
    <div class="tt-body" id="tt-body"></div>
  </div>

  <script type="module" src="./JavaScript/main.js"></script>
</body>
</html>
