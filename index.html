<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Website Builder</title>
  <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: black;">
  <!-- Entire app -->
  <div id="app">

    <!-- Top toolbar with tabs -->
    <header id="topBar">
      <nav id="toolbarTabs">
       <button class="tab-button" id="fileTabBtn">File</button>
        <button class="tab-button" id="htmlEditorTabBtn">HTML Editor</button>
        <button class="tab-button" id="cssEditorTabBtn">CSS Editor</button>
        <button class="tab-button" id="jsEditorTabBtn">JS Editor</button>
        <button class="tab-button" id="sourceCodeTabBtn">Source Code</button>
        <button class="tab-button" id="renderPreviewBtn">Render</button>
      </nav>
    </header>

    <!-- HTML Editor Ribbon -->
    <section id="htmlEditorRibbon" class="ribbon-panel">
      <div class="ribbonGroup">
        <h3>Text</h3>
        <div class="toolbar-row">
          <div class="heading-selector">
            <button id="addHeadingBtn" class="toolbar-btn primary-btn">
              <span class="toolbar-label">Heading</span>
            </button>
            <button id="headingDropdownBtn" class="toolbar-btn dropdown-toggle" type="button">▾</button>
            <div id="headingDropdownMenu" class="dropdown-menu">
              <button type="button" data-heading-level="1">H1</button>
              <button type="button" data-heading-level="2">H2</button>
              <button type="button" data-heading-level="3">H3</button>
              <button type="button" data-heading-level="4">H4</button>
              <button type="button" data-heading-level="5">H5</button>
              <button type="button" data-heading-level="6">H6</button>
            </div>
          </div>
          <button id="addParagraphBtn" class="toolbar-btn">Paragraph</button>
          <button id="addDivBtn" class="toolbar-btn">Div</button>
          <button id="addSpanBtn" class="toolbar-btn">Span</button>
          <button id="addImageBtn" class="toolbar-btn">Image</button>
          <input id="addImageInput" type="file" accept="image/*" hidden>
        </div>
     </div>
    </section>

    <header id="toolbar">
      <div id="toolbarCenter">
        <!-- Font tools -->
        <div class="toolbarGroup" id="fontTools">
          <button id="decreaseFontBtn">&lt;</button>
          <span id="fontSizeNumber">0</span>
          <button id="increaseFontBtn">&gt;</button>
        </div>



      <div id="toolbarRight">
        <!-- leave empty for now -->
      </div>
    </header>

    <!-- Main working area -->
    <main id="workspace">

      <!-- Code editor panel -->
      <section id="codePanel">
        <textarea id="htmlInput"><p class="draggable-item" contenteditable="true" style="position: absolute; left: 50px; top: 50px;">
  Drag me around
</p>

<h1 class="draggable-item" contenteditable="true" style="position: absolute; left: 220px; top: 130px;">
  Move me too
</h1>

<div class="draggable-item" style="position: absolute; left: 50px; top: 50px; width: 200px; height: 100px;">
  <div class="resize-handle top-left"></div>
  <div class="resize-handle top-right"></div>
  <div class="resize-handle bottom-left"></div>
  <div class="resize-handle bottom-right"></div>

  <p contenteditable="true">Resize me</p>
</div></textarea>
      </section>

      <!-- Live preview panel -->
      <section id="previewPanel" style="background-color: white;">
        <iframe id="previewFrame"></iframe>
      </section>

    </main>
  </div>

  <script type="module" src="./JavaScript/main.js"></script>
</body>
</html>
