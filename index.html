<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Website Builder</title>
  <link rel="stylesheet" href="style.css">
</head>


<body>
  <h1>My Website Builder</h1>

  <!--HTML Input Textarea ##Used for typeing in html code-->
  <textarea id="htmlInput"><h1>Hello World</h1><p>This should render.</p></textarea>

  <br><br>

  <!--HTML Render Button ##renders the HTML code-->
  <button id="renderHTMLBtn">Render</button>

  <br><br>

  <!--Shows the rendered HTML preview-->
  <iframe id="previewFrame"></iframe>

  <script src="script.js"></script>
</body>
</html>
